name: Weekly Blog Post Generator

on:
  schedule:
    # Every Monday 7:00 AM IST = 01:30 UTC
    - cron: "30 1 * * 1"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit and push new post
        run: |
          git config user.name "CareerLens Blog Bot"
          git config user.email "bot@carrerlens.com"
          git add content/blog/
          if git diff --staged --quiet; then
            echo "No new post generated (duplicate slug or error)"
            exit 0
          fi
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "blog: auto-publish weekly post $DATE"
          git push origin master
